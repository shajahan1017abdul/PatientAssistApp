name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk

          pip install --upgrade pip
          pip install buildozer==1.6.0 cython==0.29.37

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg

          export SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK

          yes | sdkmanager --sdk_root=$SDK --licenses || true

          sdkmanager --sdk_root=$SDK \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk