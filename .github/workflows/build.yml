name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04   # 👈 IMPORTANT (not latest)

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug
