name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev


      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.6.0 cython==0.29.37


            - name: Prepare Android SDK
            run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg

          export SDK=$HOME/.buildozer/android/platform/android-sdk

          if [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          else
            echo "sdkmanager not found"
            find $ANDROID_SDK_ROOT -name sdkmanager
            exit 1
          fi

          mkdir -p $SDK

          yes | $SDKMANAGER --sdk_root=$SDK --licenses || true

          $SDKMANAGER --sdk_root=$SDK \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Verify AIDL
        run: |
          ls -la $HOME/.buildozer/android/platform/android-sdk/build-tools/35.0.0/
          test -f $HOME/.buildozer/android/platform/android-sdk/build-tools/35.0.0/aidl


      - name: Build APK
        run: |
          buildozer -v android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
